<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Villare">
<meta name="theme-color" content="#fdf8f2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1410" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Villare Atelier</title>

<style>
  :root {
    --cream: #fdf8f2;
    --offwhite: #f5ede2;
    --warm-white: #fff9f5;
    --gold: #b8862a;
    --dark: #2a1a0e;
    --brown: #5c3318;
    --brown-mid: #7a4a28;
    --brown-light: #a0623a;
    --muted: #9a7d65;
    --muted-light: #c4a98e;
    --bordeaux: #7a2535;
    --bordeaux-soft: #c14a5e;
    --sage: #6b8f71;
    --card-bg: #ffffff;
    --header-bg: #ffffff;
    --input-bg: #ffffff;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --cream: #1a1410;
      --offwhite: #241b15;
      --warm-white: #1f1813;
      --gold: #d4a248;
      --dark: #f5ebde;
      --brown: #d4a87a;
      --brown-mid: #c19668;
      --brown-light: #b88a5e;
      --muted: #a08e7a;
      --muted-light: #6b5e52;
      --bordeaux: #d96a7e;
      --bordeaux-soft: #e8859a;
      --sage: #8fb595;
      --card-bg: #2a2118;
      --header-bg: #221a13;
      --input-bg: #2f261c;
    }
    body { color: var(--dark); }
    .login-input, .field-input, .prec-mat-input, .prec-lucro-input, .prec-simul-input {
      background: var(--input-bg) !important;
      color: var(--dark);
    }
    select.field-input option { background: var(--card-bg); color: var(--dark); }
    .app-header { background: var(--header-bg); }
    .bottom-nav { background: var(--header-bg); }
    .metric-card, .producao-card, .contract-card, .cal-month-card, .fin-totais,
    .fin-month-card, .gasto-month-card, .comp-card, .piece-card, .mat-global-card,
    .prec-resumo-card, .prec-peca-card, .detail-section,
    div[style*="overflow-x:auto"][style*="border-radius:8px"][style*="background:white"] {
      background: var(--card-bg) !important;
    }
    .ctab-th-mes, .ctab-td-mes, .ctab-td-total-label { background: var(--card-bg) !important; }
    .drawer { background: var(--warm-white); }
    .mat-modal { background: var(--cream); }
    .filter-chip { background: var(--card-bg); border-color: rgba(184,134,42,0.2); color: var(--muted); }
    .filter-row { background: var(--cream); }
    .s-Reserva    { background:rgba(212,162,72,0.18);  color:#e8c577; }
    .s-Aguardando { background:rgba(120,180,220,0.18); color:#a8cde8; }
    .s-Produção   { background:rgba(170,140,210,0.18); color:#c8a8e0; }
    .s-Concluído  { background:rgba(143,181,149,0.18); color:#a8d0ae; }
    .s-Enviado    { background:rgba(120,180,140,0.18); color:#9fcfb0; }
    .s-Cancelado  { background:rgba(217,106,126,0.18); color:#e89aa8; }
    .s-Realizado  { background:rgba(143,181,149,0.18); color:#a8d0ae; }
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Calibri',sans-serif; background:var(--cream); color:var(--dark); min-height:100vh; overflow-x:hidden; }

  #login-screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--offwhite); z-index:1000; padding:2rem; }
  .login-bg { position:absolute; inset:0; background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(184,134,42,0.12) 0%,transparent 70%); }
  .login-ornament { font-family:'Calibri',serif; font-style:italic; font-size:0.7rem; letter-spacing:0.4em; color:var(--brown-light); text-transform:uppercase; margin-bottom:1.5rem; position:relative; }
  .login-logo { font-family:'Calibri',serif; font-weight:300; font-size:3.2rem; color:var(--dark); letter-spacing:0.15em; line-height:1; position:relative; text-align:center; margin-bottom:0.3rem; }
  .login-subtitle { font-family:'Calibri',sans-serif; font-weight:300; font-size:0.65rem; letter-spacing:0.5em; color:var(--brown-light); text-transform:uppercase; margin-bottom:2rem; position:relative; }
  .login-divider { width:60px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:0 auto 2.5rem; }
  .login-form { width:100%; max-width:300px; display:flex; flex-direction:column; gap:0.9rem; position:relative; }
  .login-input { width:100%; background:white; border:1px solid rgba(184,134,42,0.3); border-radius:3px; padding:0.9rem 1.2rem; color:var(--dark); font-family:'Calibri',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.3s; }
  .login-input:focus { border-color:var(--gold); }
  .login-input::placeholder { color:var(--muted-light); }
  .login-btn { width:100%; background:var(--brown); border:none; border-radius:3px; padding:0.9rem; color:white; font-family:'Calibri',sans-serif; font-size:0.75rem; font-weight:500; letter-spacing:0.3em; text-transform:uppercase; cursor:pointer; }
  .login-btn:active { background:var(--brown-mid); }

  #app { display:flex; flex-direction:column; min-height:100vh; }

  .app-header { background:var(--header-bg); border-bottom:1px solid rgba(184,134,42,0.18); padding:0.9rem 1.2rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 1px 8px rgba(42,26,14,0.07); }
  .header-logo { font-family:'Calibri',serif; font-weight:300; font-size:1.5rem; color:var(--dark); letter-spacing:0.12em; }
  .header-logo span { color:var(--gold); font-style:italic; }
  .header-btn { background:none; border:none; cursor:pointer; color:var(--muted); font-size:1.2rem; padding:0.3rem; }

  .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--header-bg); border-top:1px solid rgba(184,134,42,0.15); display:flex; padding-bottom:env(safe-area-inset-bottom); z-index:100; box-shadow:0 -2px 12px rgba(42,26,14,0.08); }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0.6rem 0.2rem; cursor:pointer; border:none; background:none; color:var(--muted-light); font-family:'Calibri',sans-serif; font-size:0.72rem; gap:0.22rem; transition:color 0.2s; }
  .nav-item.active { color:var(--brown); }
  .nav-icon { font-size:1.25rem; line-height:1; }

  .app-content { flex:1; background:var(--cream); overflow:visible; position:relative; }
  .screen { display:none; position:absolute; inset:0; padding:1.2rem; padding-bottom:calc(5.5rem + max(env(safe-area-inset-bottom), 8px)); overflow-y:auto; background:var(--cream); }
  .screen.active { display:block; }

  .dashboard-greeting { font-family:'Calibri',serif; font-style:italic; font-size:1.6rem; color:var(--dark); margin-bottom:0.15rem; }
  .dashboard-date { font-size:0.68rem; color:var(--muted); margin-bottom:1.4rem; }

  .metrics-grid { display:flex; flex-direction:column; gap:0.5rem; margin-bottom:0.75rem; }
  .metric-card { background:white; border:1px solid rgba(184,134,42,0.16); border-radius:8px; padding:0.75rem 1rem; position:relative; overflow:hidden; box-shadow:0 1px 6px rgba(42,26,14,0.06); display:flex; align-items:center; justify-content:space-between; gap:1rem; }
  .metric-card::before { content:''; position:absolute; top:0; left:0; bottom:0; width:3px; background:linear-gradient(180deg,var(--gold),var(--brown-light)); }
  .metric-card .metric-left { padding-left:0.4rem; }
  .metric-label { font-size:0.6rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:0.35rem; }
  .metric-value { font-family:'Calibri',serif; font-size:1.55rem; font-weight:400; color:var(--dark); line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .metric-value.gold { color:var(--gold); }
  .metric-sub { font-size:0.62rem; color:var(--muted); margin-top:0.25rem; }

  .producao-card { background:white; border:1px solid rgba(184,134,42,0.16); border-radius:8px; padding:1rem; margin-bottom:1.2rem; box-shadow:0 1px 6px rgba(42,26,14,0.06); position:relative; overflow:hidden; }
  .producao-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--gold),var(--brown-light)); }
  .producao-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.8rem; }
  .producao-label { font-size:0.6rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }
  .producao-count { font-family:'Calibri',serif; font-size:1.85rem; color:var(--dark); line-height:1; }
  .producao-row { display:flex; align-items:center; justify-content:space-between; padding:0.45rem 0; border-bottom:1px solid rgba(184,134,42,0.08); }
  .producao-row:last-child { border-bottom:none; }
  .producao-nome { font-family:'Calibri',serif; font-size:1rem; color:var(--dark); }
  .producao-meta { font-size:0.65rem; color:var(--muted); margin-top:0.1rem; }
  .producao-status { font-size:0.55rem; letter-spacing:0.08em; text-transform:uppercase; padding:0.18rem 0.5rem; border-radius:20px; font-weight:500; white-space:nowrap; }

  .section-title { font-family:'Calibri',serif; font-size:1.1rem; color:var(--brown); margin-bottom:0.75rem; display:flex; align-items:center; gap:0.5rem; }
  .section-title::after { content:''; flex:1; height:1px; background:rgba(184,134,42,0.2); }

  .s-Reserva    { background:rgba(184,134,42,0.1);  color:#7a5010; border:1px solid rgba(184,134,42,0.3); }
  .s-Aguardando { background:rgba(74,127,168,0.1);  color:#2d6090; border:1px solid rgba(74,127,168,0.3); }
  .s-Produção   { background:rgba(122,90,170,0.1);  color:#5a3a8a; border:1px solid rgba(122,90,170,0.3); }
  .s-Concluído  { background:rgba(107,143,113,0.1); color:#3d6b43; border:1px solid rgba(107,143,113,0.3); }
  .s-Enviado    { background:rgba(61,122,88,0.1);   color:#2a5c3f; border:1px solid rgba(61,122,88,0.3); }
  .s-Cancelado  { background:rgba(122,37,53,0.1);   color:var(--bordeaux); border:1px solid rgba(122,37,53,0.3); }
  .s-Realizado  { background:rgba(107,143,113,0.1); color:#3d6b43; border:1px solid rgba(107,143,113,0.3); }

  .contract-card { background:white; border:1px solid rgba(184,134,42,0.15); border-radius:8px; padding:1rem; margin-bottom:0.75rem; cursor:pointer; box-shadow:0 1px 6px rgba(42,26,14,0.05); }
  .contract-card:active { opacity:0.9; }
  .contract-card-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:0.45rem; }
  .contract-name { font-family:'Calibri',serif; font-size:1.15rem; color:var(--dark); }
  .status-badge { font-size:0.58rem; letter-spacing:0.08em; text-transform:uppercase; padding:0.22rem 0.6rem; border-radius:20px; font-weight:500; white-space:nowrap; }
  .contract-meta { display:flex; gap:1rem; font-size:0.68rem; color:var(--muted); margin-bottom:0.45rem; }
  .contract-footer { display:flex; justify-content:space-between; align-items:flex-end; border-top:1px solid rgba(184,134,42,0.1); padding-top:0.5rem; margin-top:0.45rem; }
  .contract-pieces { font-size:0.67rem; color:var(--muted); }
  .contract-value { font-family:'Calibri',serif; font-size:1.15rem; color:var(--brown); }
  .contract-saldo { font-size:0.62rem; color:var(--muted); text-align:right; }
  .payment-progress { background:var(--offwhite); border-radius:2px; height:3px; margin-top:0.4rem; overflow:hidden; }
  .payment-bar { height:100%; background:linear-gradient(90deg,var(--gold),var(--brown-light)); border-radius:2px; }

  .filter-row { display:flex; gap:0.5rem; overflow-x:auto; padding-bottom:0.5rem; margin-bottom:1rem; scrollbar-width:none; }
  .filter-row::-webkit-scrollbar { display:none; }
  .filter-chip { background:white; border:1px solid rgba(184,134,42,0.25); border-radius:20px; padding:0.38rem 0.9rem; font-size:0.7rem; color:var(--muted); cursor:pointer; white-space:nowrap; font-family:'Calibri',sans-serif; transition:all 0.2s; }
  .filter-chip.active { background:var(--brown); border-color:var(--brown); color:white; }

  .fab { position:fixed; bottom:calc(6.5rem + env(safe-area-inset-bottom)); right:1.2rem; width:52px; height:52px; background:var(--brown); border:none; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.5rem; color:white; cursor:pointer; box-shadow:0 4px 16px rgba(92,51,24,0.35); z-index:99; }
  .fab:active { transform:scale(0.93); }
  .fab.hidden { display:none; }

  .cal-month-card { background:white; border:1px solid rgba(184,134,42,0.15); border-radius:8px; margin-bottom:0.75rem; overflow:hidden; box-shadow:0 1px 6px rgba(42,26,14,0.05); }
  .cal-month-header { display:grid; grid-template-columns:1fr 72px 72px; align-items:center; padding:0.8rem 1rem; border-bottom:1px solid rgba(184,134,42,0.1); background:rgba(184,134,42,0.04); gap:0.5rem; }
  .cal-month-name { font-family:'Calibri',serif; font-size:1.15rem; color:var(--brown); font-style:italic; }
  .cal-month-stat { text-align:center; }
  .cal-month-stat-num { font-family:'Calibri',serif; font-size:1.5rem; color:var(--dark); line-height:1; }
  .cal-month-stat-label { font-size:0.55rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-top:0.18rem; }
  .cal-row { display:flex; align-items:center; padding:0.55rem 1rem; border-bottom:1px solid rgba(184,134,42,0.07); gap:0.8rem; }
  .cal-row:last-child { border-bottom:none; }
  .cal-date { font-family:'Calibri',serif; font-size:1.2rem; color:var(--gold); min-width:1.8rem; text-align:center; }
  .cal-name { flex:1; font-size:0.88rem; color:var(--dark); }
  .cal-status { font-size:0.55rem; letter-spacing:0.07em; text-transform:uppercase; padding:0.18rem 0.5rem; border-radius:20px; font-weight:500; white-space:nowrap; }
  .cal-empty { padding:0.7rem 1rem; font-size:0.75rem; color:var(--muted-light); font-style:italic; }

  .fin-totais { background:white; border:1px solid rgba(184,134,42,0.16); border-radius:8px; margin-bottom:1rem; overflow:hidden; box-shadow:0 1px 6px rgba(42,26,14,0.06); position:relative; }
  .fin-totais::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--gold),var(--brown-light)); }
  .fin-totais-grid { display:flex; flex-direction:column; }
  .fin-total-col { padding:0.75rem 1rem; border-bottom:1px solid rgba(184,134,42,0.1); display:flex; align-items:center; justify-content:space-between; }
  .fin-total-col:last-child { border-bottom:none; }
  .fin-total-label { font-size:0.65rem; letter-spacing:0.07em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
  .fin-total-value { font-family:'Calibri',serif; font-size:1.15rem; color:var(--dark); white-space:nowrap; line-height:1; }
  .fin-total-value.green { color:var(--sage); }
  .fin-total-value.red   { color:#c14a5e; }
  .fin-total-value.gold  { color:var(--brown); }

  .fin-month-card { background:white; border:1px solid rgba(184,134,42,0.15); border-radius:8px; margin-bottom:0.75rem; overflow:hidden; box-shadow:0 1px 6px rgba(42,26,14,0.05); }
  .fin-month-header { display:grid; grid-template-columns:1fr 80px; align-items:center; padding:0.75rem 1rem; border-bottom:1px solid rgba(184,134,42,0.1); background:rgba(184,134,42,0.04); }
  .fin-month-name { font-family:'Calibri',serif; font-size:1.1rem; color:var(--brown); font-style:italic; }
  .fin-month-stat { text-align:center; }
  .fin-month-stat-num { font-family:'Calibri',serif; font-size:1.4rem; color:var(--dark); line-height:1; }
  .fin-month-stat-label { font-size:0.52rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-top:0.15rem; }
  .fin-month-body { padding:0.75rem 1rem; display:flex; flex-direction:column; gap:0.35rem; }
  .fin-row { display:flex; justify-content:space-between; font-size:0.78rem; }
  .fin-row .lbl { color:var(--muted); }
  .fin-row .val { font-family:'Calibri',serif; font-size:1.05rem; }
  .fin-row .val.green { color:var(--sage); }
  .fin-row .val.red   { color:#c14a5e; }
  .fin-row .val.gold  { color:var(--brown); }
  .fin-divider { height:1px; background:rgba(184,134,42,0.12); margin:0.3rem 0; }

  .gasto-month-card { background:white; border:1px solid rgba(184,134,42,0.15); border-radius:8px; margin-bottom:0.75rem; overflow:hidden; box-shadow:0 1px 6px rgba(42,26,14,0.05); }
  .gasto-month-header { display:flex; align-items:center; justify-content:space-between; padding:0.75rem 1rem; border-bottom:1px solid rgba(184,134,42,0.1); background:rgba(184,134,42,0.04); gap:0.5rem; }
  .gasto-month-name { font-family:'Calibri',serif; font-size:1.1rem; color:var(--brown); font-style:italic; flex:1; }
  .gasto-month-total { font-family:'Calibri',serif; font-size:1.1rem; color:var(--bordeaux); white-space:nowrap; }
  .gasto-item { display:flex; align-items:center; justify-content:space-between; padding:0.6rem 1rem; border-bottom:1px solid rgba(184,134,42,0.07); }
  .gasto-item:last-child { border-bottom:none; }
  .gasto-nome { font-family:'Calibri',serif; font-size:0.95rem; color:var(--dark); }
  .gasto-meta { font-size:0.63rem; color:var(--muted); margin-top:0.1rem; }
  .gasto-valor { font-family:'Calibri',serif; font-size:1rem; color:var(--bordeaux); white-space:nowrap; }

  .comp-card { background:white; border:1px solid rgba(184,134,42,0.15); border-radius:8px; overflow:hidden; margin-bottom:0.75rem; box-shadow:0 1px 6px rgba(42,26,14,0.05); }
  .comp-card-title { font-family:'Calibri',serif; font-size:1rem; color:var(--brown); padding:0.8rem 1rem; border-bottom:1px solid rgba(184,134,42,0.1); background:rgba(184,134,42,0.03); }
  .comp-table { width:100%; border-collapse:collapse; }
  .comp-table th { font-size:0.58rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); font-weight:400; padding:0.45rem 0.8rem; text-align:left; border-bottom:1px solid rgba(184,134,42,0.12); }
  .comp-table th.r { text-align:right; }
  .comp-table td { font-size:0.82rem; padding:0.5rem 0.8rem; border-bottom:1px solid rgba(184,134,42,0.07); color:var(--dark); }
  .comp-table td:first-child { font-family:'Calibri',serif; font-size:0.95rem; color:var(--brown); }
  .comp-table td.r { text-align:right; font-family:'Calibri',serif; font-size:0.95rem; }
  .comp-table tr:last-child td { border-bottom:none; }

  .piece-card { background:white; border:1px solid rgba(184,134,42,0.15); border-radius:8px; padding:0.9rem 1rem; margin-bottom:0.6rem; display:flex; align-items:center; justify-content:space-between; box-shadow:0 1px 4px rgba(42,26,14,0.05); cursor:pointer; }
  .piece-name { font-family:'Calibri',serif; font-size:1.05rem; color:var(--dark); }
  .piece-price { font-family:'Calibri',serif; font-size:1.1rem; color:var(--brown); }

  .mat-global-card { background:white; border:1px solid rgba(184,134,42,0.16); border-radius:8px; padding:0.85rem 1rem; margin-bottom:0.6rem; box-shadow:0 1px 4px rgba(42,26,14,0.05); }
  .mat-global-header { display:flex; align-items:flex-start; justify-content:space-between; gap:0.5rem; }
  .mat-global-nome { font-family:'Calibri',serif; font-size:1rem; color:var(--dark); flex:1; }
  .mat-global-del { background:none; border:none; color:var(--bordeaux); font-size:1.1rem; cursor:pointer; padding:0; line-height:1; flex-shrink:0; }
  .mat-global-info { font-size:0.68rem; color:var(--muted); margin-top:0.2rem; }
  .mat-global-custo { font-family:'Calibri',serif; font-size:0.9rem; color:var(--gold); margin-top:0.15rem; }
  .mat-unit-badge { display:inline-block; background:rgba(184,134,42,0.1); color:var(--brown); border-radius:3px; padding:0.05rem 0.35rem; font-size:0.62rem; letter-spacing:0.05em; margin-left:0.3rem; }

  .mat-modal-overlay { position:fixed; inset:0; background:rgba(42,26,14,0.45); z-index:500; display:none; align-items:flex-end; justify-content:center; }
  .mat-modal-overlay.open { display:flex; }
  .mat-modal { background:var(--cream); border-radius:16px 16px 0 0; padding:1.4rem 1.2rem 2rem; width:100%; max-width:520px; max-height:80vh; overflow-y:auto; }
  .mat-modal-title { font-family:'Calibri',serif; font-size:1.1rem; color:var(--brown); margin-bottom:1rem; }
